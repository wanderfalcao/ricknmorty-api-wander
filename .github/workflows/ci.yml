name: CI

on:
  push:
    branches:
      - master
      - main
      - dev
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Executar testes automatizados"
        type: boolean
        default: true
      run_lint:
        description: "Executar lint"
        type: boolean
        default: true

permissions:
  issues: write
  contents: read
  security-events: write
  actions: read

jobs:

  lint-and-test:
    name: Lint e Testes
    uses: ./.github/workflows/lint-and-test.yml
    with:
      run_tests: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests }}
      run_lint: ${{ github.event_name != 'workflow_dispatch' || inputs.run_lint }}

  security:
    name: Analise de Seguranca (CodeQL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build para analise
        run: mvn package -DskipTests -q

      - name: Executar analise CodeQL
        uses: github/codeql-action/analyze@v3

      - name: Abrir issue se analise falhou
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Falha na analise de seguranca — ${context.ref_name} (run #${context.runNumber})`,
              body: `O workflow **${context.workflow}** falhou na etapa de seguranca.\n\nCommit: ${context.sha}\nAcionado por: @${context.actor}`,
              labels: ['bug', 'ci-failure']
            })

  deploy-dev:
    name: Deploy Dev
    needs: lint-and-test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy em DEV
        run: echo "Deploy em DEV — ${{ vars.DEPLOY_URL }}"

  deploy-prod:
    name: Deploy Prod
    needs: lint-and-test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy em PROD
        run: echo "Deploy em PROD aprovado por revisor"
